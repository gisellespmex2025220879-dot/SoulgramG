<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soulgram</title>

<!-- Official browser build -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#f4f4f4;
  margin:0;
}

header{
  background:#2d3e50;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

textarea{
  width:100%;
  height:80px;
  padding:10px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  background:#2d3e50;
  color:white;
  border:none;
}

.post{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:6px;
}

#debug{
  margin-top:10px;
  color:red;
}
</style>
</head>

<body>

<header>
<h1>Soulgram</h1>
</header>

<div class="container">

<textarea id="reflection" placeholder="Share a reflection..."></textarea>
<br>
<button id="postBtn">Post</button>

<div id="debug"></div>

<div id="feed"></div>

</div>

<script>

const supabaseUrl = "https://tsjijeklkzydjfbbrvtr.supabase.co";
const supabaseKey = "PASTE_YOUR_ANON_KEY_HERE";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

const debug = document.getElementById("debug");
const feed = document.getElementById("feed");

document.getElementById("postBtn").addEventListener("click", postReflection);

async function postReflection(){

  const text = document.getElementById("reflection").value;

  debug.innerText = "Posting...";

  const { data, error } = await supabase
    .from("Soulgram")
    .insert({ content: text });

  if(error){
    debug.innerText = "Error: " + error.message;
    return;
  }

  debug.innerText = "Posted successfully";

  document.getElementById("reflection").value = "";

  loadFeed();
}

async function loadFeed(){

  const { data, error } = await supabase
    .from("Soulgram")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    debug.innerText = "Load error: " + error.message;
    return;
  }

  feed.innerHTML="";

  data.forEach(post=>{
    feed.innerHTML += `
      <div class="post">
        <p>${post.content}</p>
      </div>
    `;
  });

}

loadFeed();

</script>

</body>
</html>
